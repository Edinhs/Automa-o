# Configurações do Script de Atualização Automática de Workspace (IPC)
# RNF-03: Sem caminhos hard-coded específicos por projeto

network_paths:
  # Repositório de especificações (Word)
  spec_repository: "\\\\abrbet01apcp4b0\\Spec"
  # Repositório de Change Requests (ZIPs de CR)
  cr_repository: "\\\\abrbet01apcp4b0\\CHG_MNG"

projects:
  J3U:
    # Subpasta específica do projeto no repositório de SPEC
    spec_folder: "SPEC J3U - 5870\\J3U_Work in progress"
    # Caminho até a documentação de requisitos dentro da pasta do projeto
    requirements_subpath: "03-EE System Requirements\\IPC - Instrument Panel Cluster 10 [CAN]\\VF-Functional Requirements"
    # Padrão de busca do arquivo Word de VFs (deve iniciar com VFList)
    word_file_pattern: "VFList*.docx"
    
    # Subpasta específica de CRs do projeto no repositório de CHG_MNG
    cr_folder: "J3U - Data Change Request Management"
    
    # Pasta local monitorada pelo Stellantis Automation HUB para onde as VFs extraídas devem ir
    workspace_local_path: "./data/workspaces/J3U"
